<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Пульт заявок — Дорожная карта</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #12161d;
    --panel: #1a2029;
    --panel-2: #202836;
    --line: #2b3341;
    --text: #eef1f6;
    --muted: #8993a4;
    --muted-2: #5c6577;
    --urgent: #ff6b4a;
    --urgent-dim: rgba(255,107,74,0.14);
    --ok: #46e0a1;
    --ok-dim: rgba(70,224,161,0.14);
    --amber: #f2b84b;
    --amber-dim: rgba(242,184,75,0.14);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap{
    max-width: 980px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }
  header{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .brand-eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted-2);
    margin: 0 0 6px;
  }
  h1{
    margin:0;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .live-clock{
    font-family:'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .live-dot{
    width:7px;height:7px;border-radius:50%;
    background: var(--ok);
    box-shadow: 0 0 0 0 rgba(70,224,161,0.5);
    animation: livepulse 2s infinite;
  }
  @keyframes livepulse{
    0%{ box-shadow: 0 0 0 0 rgba(70,224,161,0.45);}
    70%{ box-shadow: 0 0 0 7px rgba(70,224,161,0);}
    100%{ box-shadow: 0 0 0 0 rgba(70,224,161,0);}
  }

  .board{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow:hidden;
    margin-bottom: 22px;
  }
  .stat{
    background: var(--panel);
    padding: 18px 20px;
  }
  .stat-label{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted-2);
    margin-bottom: 10px;
  }
  .stat-num{
    font-family:'IBM Plex Mono', monospace;
    font-size: 34px;
    font-weight: 600;
    line-height: 1;
  }
  .stat-num.urgent{ color: var(--urgent); }
  .stat-num.ok{ color: var(--ok); }
  .stat-sub{
    margin-top: 8px;
    font-size: 12.5px;
    color: var(--muted);
  }

  .tabs{
    display:flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .tab{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.03em;
    padding: 8px 14px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--muted);
    cursor:pointer;
  }
  .tab.active{
    background: var(--panel-2);
    color: var(--text);
    border-color: #3a4456;
  }

  .log{
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
  }
  .row{
    display:grid;
    grid-template-columns: 20px 1fr 130px 110px 150px;
    align-items:center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  .row:last-child{ border-bottom:none; }
  .row.head{
    background: var(--panel-2);
    font-family:'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted-2);
    padding: 10px 18px;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background: var(--muted-2);
  }
  .row[data-status="новая"] .dot{
    background: var(--urgent);
    animation: livepulse2 1.6s infinite;
  }
  @keyframes livepulse2{
    0%{ box-shadow: 0 0 0 0 rgba(255,107,74,0.5);}
    70%{ box-shadow: 0 0 0 6px rgba(255,107,74,0);}
    100%{ box-shadow: 0 0 0 0 rgba(255,107,74,0);}
  }
  .phone{
    font-family:'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 500;
  }
  .req-type{
    display:block;
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .elapsed{
    font-family:'IBM Plex Mono', monospace;
    font-size: 13px;
  }
  .elapsed.warn{ color: var(--amber); }
  .elapsed.urgent{ color: var(--urgent); font-weight:600; }
  .badge{
    display:inline-block;
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    text-align:center;
  }
  .badge.новая{ background: var(--urgent-dim); color: var(--urgent); }
  .badge.обработана{ background: var(--ok-dim); color: var(--ok); }
  .action-btn{
    font-family:'IBM Plex Sans', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid #3a4456;
    background: transparent;
    color: var(--text);
    cursor:pointer;
    transition: background 0.15s ease;
  }
  .action-btn:hover{ background: var(--panel-2); }
  .action-btn:disabled{
    opacity: 0.4;
    cursor: default;
  }
  .empty{
    padding: 48px 20px;
    text-align:center;
    color: var(--muted);
    font-size: 14px;
  }
  .foot-note{
    margin-top: 18px;
    font-size: 12px;
    color: var(--muted-2);
    text-align:center;
  }
  @media (max-width: 640px){
    .board{ grid-template-columns: 1fr; }
    .row{ grid-template-columns: 16px 1fr 90px; grid-template-areas: "dot phone status" "dot elapsed action"; }
    .row.head{ display:none; }
    .row .elapsed{ grid-column: 2; }
    .row .badge{ grid-column: 3; }
    .row .action-btn{ grid-column: 2 / span 2; margin-top: 8px; width: 100%; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <p class="brand-eyebrow">Пульт заявок · Дорожная карта</p>
      <h1>Кто уже ждёт звонка</h1>
    </div>
    <div class="live-clock"><span class="live-dot"></span><span id="clock">—</span></div>
  </header>

  <div class="board">
    <div class="stat">
      <div class="stat-label">Всего заявок</div>
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-sub">за всё время</div>
    </div>
    <div class="stat">
      <div class="stat-label">Ждут ответа</div>
      <div class="stat-num urgent" id="stat-new">—</div>
      <div class="stat-sub" id="stat-new-sub">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Дольше всех ждёт</div>
      <div class="stat-num ok" id="stat-longest">—</div>
      <div class="stat-sub" id="stat-longest-sub">—</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-filter="все">Все</button>
    <button class="tab" data-filter="новая">Ждут ответа</button>
    <button class="tab" data-filter="обработана">Обработанные</button>
  </div>

  <div class="log" id="log">
    <div class="row head">
      <div></div>
      <div>Телефон / заявка</div>
      <div>Ждёт</div>
      <div>Статус</div>
      <div></div>
    </div>
    <div id="rows"></div>
  </div>

  <p class="foot-note">Обновляется автоматически каждые 20 секунд · данные из Supabase</p>
</div>

<script>
const SUPABASE_URL = "https://ilfxyvsqintvjbifqxvr.supabase.co";
const SUPABASE_KEY = "sb_publishable_GEl1zhHAxT_i8zU2F86cOA_-G6n7uBH";

let allLeads = [];
let currentFilter = "все";

function fmtClock(){
  const d = new Date();
  document.getElementById('clock').textContent = d.toLocaleTimeString('ru-RU');
}
setInterval(fmtClock, 1000);
fmtClock();

function elapsedText(createdAt){
  const start = new Date(createdAt).getTime();
  const now = Date.now();
  let diff = Math.max(0, Math.floor((now - start) / 1000));
  const days = Math.floor(diff / 86400);
  diff -= days * 86400;
  const hrs = Math.floor(diff / 3600);
  diff -= hrs * 3600;
  const mins = Math.floor(diff / 60);

  if (days > 0) return { text: `${days} дн ${hrs} ч`, level: 'urgent' };
  if (hrs > 0) return { text: `${hrs} ч ${mins} мин`, level: hrs >= 1 ? 'urgent' : 'warn' };
  if (mins >= 15) return { text: `${mins} мин`, level: 'warn' };
  return { text: `${mins} мин`, level: 'ok' };
}

async function fetchLeads(){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/leads?select=*&order=created_at.desc`, {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    });
    if(!res.ok) throw new Error('Ошибка запроса: ' + res.status);
    allLeads = await res.json();
    render();
  }catch(e){
    document.getElementById('rows').innerHTML = `<div class="empty">Не удалось загрузить данные.<br>${e.message}</div>`;
  }
}

async function markProcessed(id, btn){
  btn.disabled = true;
  btn.textContent = '...';
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/leads?id=eq.${id}`, {
      method: 'PATCH',
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ status: 'обработана' })
    });
    await fetchLeads();
  }catch(e){
    btn.disabled = false;
    btn.textContent = 'Ошибка, повторить';
  }
}

function render(){
  const total = allLeads.length;
  const newOnes = allLeads.filter(l => l.status === 'новая');

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-new').textContent = newOnes.length;
  document.getElementById('stat-new-sub').textContent = newOnes.length > 0 ? 'нужен звонок' : 'всё обработано';

  if(newOnes.length > 0){
    const longest = newOnes.reduce((a,b) => new Date(a.created_at) < new Date(b.created_at) ? a : b);
    const e = elapsedText(longest.created_at);
    document.getElementById('stat-longest').textContent = e.text;
    document.getElementById('stat-longest-sub').textContent = '+7 ' + formatPhone(longest.phone);
  } else {
    document.getElementById('stat-longest').textContent = '—';
    document.getElementById('stat-longest-sub').textContent = 'очередь пуста';
  }

  const rowsEl = document.getElementById('rows');
  const filtered = currentFilter === 'все' ? allLeads : allLeads.filter(l => l.status === currentFilter);

  if(filtered.length === 0){
    rowsEl.innerHTML = `<div class="empty">Заявок пока нет.</div>`;
    return;
  }

  rowsEl.innerHTML = filtered.map(l => {
    const e = elapsedText(l.created_at);
    const isNew = l.status === 'новая';
    return `
      <div class="row" data-status="${l.status}" data-id="${l.id}">
        <div class="dot"></div>
        <div>
          <span class="phone">${formatPhone(l.phone)}</span>
          <span class="req-type">${l.request_type || 'Заявка'}</span>
        </div>
        <div class="elapsed ${e.level}">${e.text}</div>
        <div><span class="badge ${l.status}">${l.status}</span></div>
        <div>
          ${isNew ? `<button class="action-btn" onclick="markProcessed(${l.id}, this)">Отметить: ответил</button>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function formatPhone(p){
  if(!p) return '—';
  const digits = String(p).replace(/\D/g,'');
  if(digits.length === 11 && digits.startsWith('7')){
    return `+7 ${digits.slice(1,4)} ${digits.slice(4,7)} ${digits.slice(7,9)} ${digits.slice(9,11)}`;
  }
  return p;
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    render();
  });
});

fetchLeads();
setInterval(fetchLeads, 20000);
setInterval(render, 15000);
</script>
</body>
</html>

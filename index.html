<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Пульт заявок — Радар</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #12161d;
    --panel: #1a2029;
    --panel-2: #202836;
    --line: #2b3341;
    --text: #eef1f6;
    --muted: #8993a4;
    --muted-2: #5c6577;
    --urgent: #ff6b4a;
    --urgent-dim: rgba(255,107,74,0.14);
    --ok: #46e0a1;
    --ok-dim: rgba(70,224,161,0.14);
    --amber: #f2b84b;
    --amber-dim: rgba(242,184,75,0.14);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap{
    max-width: 980px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }
  header{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .brand-eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted-2);
    margin: 0 0 6px;
  }
  h1{
    margin:0;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .live-clock{
    font-family:'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .live-dot{
    width:7px;height:7px;border-radius:50%;
    background: var(--ok);
    box-shadow: 0 0 0 0 rgba(70,224,161,0.5);
    animation: livepulse 2s infinite;
  }
  .header-right{
    display:flex;
    align-items:center;
    gap: 16px;
  }
  .back-link{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 7px 12px;
    cursor: pointer;
    text-decoration: none;
  }
  .back-link:hover{
    color: var(--text);
    border-color: #3a4456;
  }
  @keyframes livepulse{
    0%{ box-shadow: 0 0 0 0 rgba(70,224,161,0.45);}
    70%{ box-shadow: 0 0 0 7px rgba(70,224,161,0);}
    100%{ box-shadow: 0 0 0 0 rgba(70,224,161,0);}
  }

  .board{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow:hidden;
    margin-bottom: 22px;
  }
  .stat{
    background: var(--panel);
    padding: 18px 20px;
  }
  .stat-label{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted-2);
    margin-bottom: 10px;
  }
  .stat-num{
    font-family:'IBM Plex Mono', monospace;
    font-size: 34px;
    font-weight: 600;
    line-height: 1;
  }
  .stat-num.urgent{ color: var(--urgent); }
  .stat-num.ok{ color: var(--ok); }
  .stat-sub{
    margin-top: 8px;
    font-size: 12.5px;
    color: var(--muted);
  }

  .tabs{
    display:flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .period-row{
    display:flex;
    align-items:center;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .period-label{
    font-family:'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted-2);
  }
  .period-tabs{
    display:flex;
    gap: 6px;
  }
  .tab{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.03em;
    padding: 8px 14px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--muted);
    cursor:pointer;
  }
  .tab.active{
    background: var(--panel-2);
    color: var(--text);
    border-color: #3a4456;
  }

  .log{
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
  }
  .row{
    display:grid;
    grid-template-columns: 20px 1fr 110px 130px 110px 150px;
    align-items:center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  .row:last-child{ border-bottom:none; }
  .row.head{
    background: var(--panel-2);
    font-family:'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted-2);
    padding: 10px 18px;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background: var(--muted-2);
  }
  .row[data-status="новая"] .dot{
    background: var(--urgent);
    animation: livepulse2 1.6s infinite;
  }
  @keyframes livepulse2{
    0%{ box-shadow: 0 0 0 0 rgba(255,107,74,0.5);}
    70%{ box-shadow: 0 0 0 6px rgba(255,107,74,0);}
    100%{ box-shadow: 0 0 0 0 rgba(255,107,74,0);}
  }
  .phone{
    font-family:'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 500;
  }
  .req-type{
    display:block;
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .elapsed{
    font-family:'IBM Plex Mono', monospace;
    font-size: 13px;
  }
  .elapsed.warn{ color: var(--amber); }
  .elapsed.urgent{ color: var(--urgent); font-weight:600; }
  .badge{
    display:inline-block;
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    text-align:center;
  }
  .badge.новая{ background: var(--urgent-dim); color: var(--urgent); }
  .badge.обработана{ background: var(--ok-dim); color: var(--ok); }
  .source-badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .source-badge .dot-ico{
    width:7px;height:7px;border-radius:50%;
    flex-shrink:0;
  }
  .source-badge.telegram{ background: rgba(51,144,236,0.14); color:#4fa8f0; }
  .source-badge.telegram .dot-ico{ background:#4fa8f0; }
  .source-badge.whatsapp{ background: rgba(70,224,161,0.14); color: var(--ok); }
  .source-badge.whatsapp .dot-ico{ background: var(--ok); }
  .source-badge.instagram{ background: rgba(214,88,159,0.16); color:#e37fb5; }
  .source-badge.instagram .dot-ico{ background:#e37fb5; }
  .source-badge.unknown{ background: rgba(137,147,164,0.14); color: var(--muted); }
  .source-badge.unknown .dot-ico{ background: var(--muted); }
  .action-btn{
    font-family:'IBM Plex Sans', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid #3a4456;
    background: transparent;
    color: var(--text);
    cursor:pointer;
    transition: background 0.15s ease;
  }
  .action-btn:hover{ background: var(--panel-2); }
  .action-btn:disabled{
    opacity: 0.4;
    cursor: default;
  }
  .remind-wrap{
    margin-top: 6px;
    display:flex;
    align-items:center;
    gap: 6px;
  }
  .remind-select{
    font-family:'IBM Plex Sans', sans-serif;
    font-size: 11.5px;
    padding: 5px 8px;
    border-radius: 7px;
    border: 1px solid #3a4456;
    background: var(--panel-2);
    color: var(--text);
    cursor:pointer;
  }
  .remind-badge{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--amber);
    white-space: nowrap;
  }
  .lock-screen{
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 1000;
    display:flex;
    flex-direction: column;
    align-items:center;
    justify-content:center;
    padding: 16px;
    box-sizing: border-box;
  }
  .lock-cover{
    max-width: 100%;
    max-height: 62vh;
    width: auto;
    height: auto;
    object-fit: contain;
    border-radius: 16px;
    display:block;
    margin: 0 auto 20px;
  }
  .lock-form-bar{
    width: 100%;
    max-width: 360px;
    display:flex;
    flex-direction: column;
    align-items:center;
  }
  .lock-form-inner{
    width: 100%;
    max-width: 360px;
  }
  @media (min-width: 900px){
    .lock-screen{
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: 64px;
      padding: 40px;
    }
    .lock-cover{
      max-height: 88vh;
      max-width: 42vw;
      margin: 0;
      order: 2;
    }
    .lock-form-bar{
      order: 1;
      align-items: flex-start;
      max-width: 340px;
    }
    .lock-eyebrow, .lock-title{
      text-align: left;
    }
    .lock-form-row{
      justify-content: flex-start;
    }
  }
  .lock-eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin: 0 0 6px;
    text-align:center;
  }
  .lock-title{
    font-size: 16px;
    font-weight: 600;
    margin: 0 0 14px;
    color: #ffffff;
    text-align:center;
  }
  .lock-form-row{
    display:flex;
    gap: 10px;
  }
  .lock-input{
    flex: 1;
    box-sizing: border-box;
    font-family:'IBM Plex Mono', monospace;
    font-size: 17px;
    letter-spacing: 4px;
    text-align:center;
    padding: 13px 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.08);
    color: #ffffff;
  }
  .lock-input::placeholder{ color: rgba(255,255,255,0.35); }
  .lock-input:focus{ outline:none; border-color: var(--ok); }
  .lock-btn{
    flex-shrink: 0;
    font-family:'IBM Plex Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 22px;
    border-radius: 10px;
    border: none;
    background: var(--ok);
    color: #0b1210;
    cursor:pointer;
  }
  .lock-error{
    margin-top: 10px;
    font-size: 12px;
    color: #ff8a70;
    min-height: 16px;
    text-align:center;
  }
  .content-hidden{ display:none; }
  .empty{
    padding: 48px 20px;
    text-align:center;
    color: var(--muted);
    font-size: 14px;
  }
  .foot-note{
    margin-top: 18px;
    font-size: 12px;
    color: var(--muted-2);
    text-align:center;
  }
  @media (max-width: 640px){
    .board{ grid-template-columns: 1fr; }
    .row{ grid-template-columns: 16px 1fr 90px; grid-template-areas: "dot phone status" "dot source status" "dot elapsed action"; }
    .row.head{ display:none; }
    .row .source-cell{ grid-column: 2; }
    .row .elapsed{ grid-column: 2; }
    .row .badge{ grid-column: 3; }
    .row .action-btn{ grid-column: 2 / span 2; margin-top: 8px; width: 100%; }
  }
</style>
</head>

<script>
const SUPABASE_URL = "https://ilfxyvsqintvjbifqxvr.supabase.co";
const SUPABASE_KEY = "sb_publishable_GEl1zhHAxT_i8zU2F86cOA_-G6n7uBH";

let allLeads = [];
let currentFilter = "все";
let currentPeriod = "all";

function periodStartDate(period){
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if(period === 'today') return start;
  if(period === '7d') return new Date(start.getTime() - 6*86400000);
  if(period === '30d') return new Date(start.getTime() - 29*86400000);
  return null; // 'all'
}

function fmtClock(){
  const d = new Date();
  document.getElementById('clock').textContent = d.toLocaleTimeString('ru-RU');
}
setInterval(fmtClock, 1000);
fmtClock();

function elapsedText(createdAt){
  const start = new Date(createdAt).getTime();
  const now = Date.now();
  let diff = Math.max(0, Math.floor((now - start) / 1000));
  const days = Math.floor(diff / 86400);
  diff -= days * 86400;
  const hrs = Math.floor(diff / 3600);
  diff -= hrs * 3600;
  const mins = Math.floor(diff / 60);

  if (days > 0) return { text: `${days} дн ${hrs} ч`, level: 'urgent' };
  if (hrs > 0) return { text: `${hrs} ч ${mins} мин`, level: hrs >= 1 ? 'urgent' : 'warn' };
  if (mins >= 15) return { text: `${mins} мин`, level: 'warn' };
  return { text: `${mins} мин`, level: 'ok' };
}

async function fetchLeads(){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/leads?select=*&order=created_at.desc`, {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    });
    if(!res.ok) throw new Error('Ошибка запроса: ' + res.status);
    allLeads = await res.json();
    render();
  }catch(e){
    document.getElementById('rows').innerHTML = `<div class="empty">Не удалось загрузить данные.<br>${e.message}</div>`;
  }
}

async function markProcessed(id, btn){
  btn.disabled = true;
  btn.textContent = '...';
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/leads?id=eq.${id}`, {
      method: 'PATCH',
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ status: 'обработана' })
    });
    await fetchLeads();
  }catch(e){
    btn.disabled = false;
    btn.textContent = 'Ошибка, повторить';
  }
}

async function setReminder(id, selectEl){
  const minutes = parseInt(selectEl.value, 10);
  selectEl.disabled = true;
  try{
    if(!minutes){
      // "Без напоминания" — сбрасываем
      await fetch(`${SUPABASE_URL}/rest/v1/leads?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ remind_at: null, reminded: false })
      });
    } else {
      const remindAt = new Date(Date.now() + minutes * 60000).toISOString();
      await fetch(`${SUPABASE_URL}/rest/v1/leads?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ remind_at: remindAt, reminded: false })
      });
    }
    await fetchLeads();
  }catch(e){
    selectEl.disabled = false;
  }
}

function render(){
  const start = periodStartDate(currentPeriod);
  const periodLeads = start ? allLeads.filter(l => new Date(l.created_at) >= start) : allLeads;

  const total = periodLeads.length;
  const newOnes = periodLeads.filter(l => l.status === 'новая');

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-new').textContent = newOnes.length;
  document.getElementById('stat-new-sub').textContent = newOnes.length > 0 ? 'нужен звонок' : 'всё обработано';

  if(newOnes.length > 0){
    const longest = newOnes.reduce((a,b) => new Date(a.created_at) < new Date(b.created_at) ? a : b);
    const e = elapsedText(longest.created_at);
    document.getElementById('stat-longest').textContent = e.text;
    document.getElementById('stat-longest-sub').textContent = '+7 ' + formatPhone(longest.phone);
  } else {
    document.getElementById('stat-longest').textContent = '—';
    document.getElementById('stat-longest-sub').textContent = 'очередь пуста';
  }

  const rowsEl = document.getElementById('rows');
  const filtered = currentFilter === 'все' ? periodLeads : periodLeads.filter(l => l.status === currentFilter);

  if(filtered.length === 0){
    rowsEl.innerHTML = `<div class="empty">Заявок пока нет.</div>`;
    return;
  }

  rowsEl.innerHTML = filtered.map(l => {
    const e = elapsedText(l.created_at);
    const isNew = l.status === 'новая';
    return `
      <div class="row" data-status="${l.status}" data-id="${l.id}">
        <div class="dot"></div>
        <div>
          <span class="phone">${formatPhone(l.phone)}</span>
          <span class="req-type">${l.request_type || 'Заявка'}</span>
        </div>
        <div class="source-cell">${sourceInfo(l.source)}</div>
        <div class="elapsed ${e.level}">${e.text}</div>
        <div><span class="badge ${l.status}">${l.status}</span></div>
        <div>
          ${isNew ? `<button class="action-btn" onclick="markProcessed(${l.id}, this)">Отметить: ответил</button>` : ''}
          ${isNew ? reminderControl(l) : ''}
        </div>
      </div>
    `;
  }).join('');
}

function reminderControl(l){
  const now = Date.now();
  const hasActiveReminder = l.remind_at && !l.reminded && new Date(l.remind_at).getTime() > now;
  const isDue = l.remind_at && !l.reminded && new Date(l.remind_at).getTime() <= now;

  if(hasActiveReminder){
    const t = new Date(l.remind_at);
    const hh = String(t.getHours()).padStart(2,'0');
    const mm = String(t.getMinutes()).padStart(2,'0');
    return `<div class="remind-wrap"><span class="remind-badge">🔔 напомню в ${hh}:${mm}</span></div>`;
  }
  if(isDue){
    return `<div class="remind-wrap"><span class="remind-badge">🔔 время напомнить!</span></div>`;
  }
  return `<div class="remind-wrap">
    <select class="remind-select" onchange="setReminder(${l.id}, this)">
      <option value="0">Напомнить...</option>
      <option value="15">через 15 мин</option>
      <option value="30">через 30 мин</option>
      <option value="60">через 1 час</option>
    </select>
  </div>`;
}

function sourceInfo(src){
  const s = (src || 'unknown').toLowerCase();
  const map = {
    telegram: 'Telegram',
    whatsapp: 'WhatsApp',
    instagram: 'Instagram',
  };
  const label = map[s] || 'Не указан';
  const cls = map[s] ? s : 'unknown';
  return `<span class="source-badge ${cls}"><span class="dot-ico"></span>${label}</span>`;
}

function formatPhone(p){
  if(!p) return '—';
  const digits = String(p).replace(/\D/g,'');
  if(digits.length === 11 && digits.startsWith('7')){
    return `+7 ${digits.slice(1,4)} ${digits.slice(4,7)} ${digits.slice(7,9)} ${digits.slice(9,11)}`;
  }
  return p;
}

const PASSWORD_HASH = '8901e5df06abf35b898199e4b78a8376b724832f2206616315f5115b03896378';

async function sha256Hex(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function startApp(){
  document.getElementById('mainContent').classList.remove('content-hidden');
  fetchLeads();
  setInterval(fetchLeads, 20000);
  setInterval(render, 15000);
}

async function tryUnlock(){
  const input = document.getElementById('lockInput');
  const errorEl = document.getElementById('lockError');
  const hash = await sha256Hex(input.value.trim());
  if(hash === PASSWORD_HASH){
    sessionStorage.setItem('radar_unlocked', '1');
    document.getElementById('lockScreen').style.display = 'none';
    startApp();
  } else {
    errorEl.textContent = 'Неверный пароль, попробуйте ещё раз';
    input.value = '';
    input.focus();
  }
}

document.getElementById('lockBtn').addEventListener('click', tryUnlock);

document.getElementById('backToCoverBtn').addEventListener('click', () => {
  sessionStorage.removeItem('radar_unlocked');
  document.getElementById('mainContent').classList.add('content-hidden');
  document.getElementById('lockScreen').style.display = 'flex';
  document.getElementById('lockInput').value = '';
  document.getElementById('lockError').textContent = '';
});
document.getElementById('lockInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') tryUnlock();
});

if(sessionStorage.getItem('radar_unlocked') === '1'){
  document.getElementById('lockScreen').style.display = 'none';
  startApp();
}
